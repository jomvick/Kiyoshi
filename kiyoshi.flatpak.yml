app-id: io.zenstudio.kiyoshi
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20
command: kiyoshi
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node20/bin
modules:
  - name: kiyoshi
    buildsystem: simple
    build-commands:
      - cp -r /run/build/kiyoshi/bundle/* /app/
      - install -Dm755 kiyoshi.sh /app/bin/kiyoshi
    sources:
      - type: dir
        path: build/linux/x64/release/bundle
      - type: script
        dest-filename: kiyoshi.sh
        commands:
          - export TMPDIR="$XDG_RUNTIME_DIR/app/$FLATPAK_ID"
          - exec zypak-wrapper /app/bin/kiyoshi "$@"