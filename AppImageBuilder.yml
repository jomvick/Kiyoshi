AppDir:
  path: ./AppDir
  app_info:
    id: com.kiyoshi.app
    name: Kiyoshi
    icon: kiyoshi
    version: 1.0.0
    exec: usr/bin/kiyoshi
    exec_args: $@
  apt:
    arch: amd64
    allow_unauthenticated: true
    sources:
      - sourceline: deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ focal main
    include:
      - libgtk-3-0
      - libblkid1
      - liblzma5
      - libegl1

AppImage:
