name: Build Linux Packages
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libblkid-dev libjsoncpp-dev \
            libsecret-1-dev libstdc++-12-dev
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-bundle
          path: build/linux/x64/release/bundle/

  appimage:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: flutter-bundle
          path: build/linux/x64/release/bundle/
      - name: Get version
        run: echo "APP_VERSION=$(cat VERSION 2>/dev/null || echo '1.0.1')" >> $GITHUB_ENV
      - run: pip3 install appimage-builder
      - name: Patch version in recipe
        run: |
          sed -i "s/^    version: .*/    version: $APP_VERSION/" AppImageBuilder.yml
      - run: appimage-builder --recipe AppImageBuilder.yml
      - name: Verify AppImage
        run: |
          chmod +x Kiyoshi-*.AppImage
          ./Kiyoshi-*.AppImage --appimage-extract-and-run --help 2>/dev/null && echo "✓ AppImage executable OK" || echo "⚠ AppImage verification skipped (no display)"
      - uses: softprops/action-gh-release@v2
        with:
          files: 'Kiyoshi-*.AppImage'
          generate_release_notes: true

  rpm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: flutter-bundle
          path: build/linux/x64/release/bundle/
      - name: Get version
        run: echo "APP_VERSION=$(cat VERSION 2>/dev/null || echo '1.0.1')" >> $GITHUB_ENV
      - run: sudo apt-get install -y rpm
      - run: mkdir -p build/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
      - name: Create source tarball
        run: |
          mkdir -p "build/rpmbuild/kiyoshi-$APP_VERSION"
          cp -r build/linux/x64/release/bundle/* "build/rpmbuild/kiyoshi-$APP_VERSION/"
          cp packaging/kiyoshi.sh "build/rpmbuild/kiyoshi-$APP_VERSION/"
          cp packaging/kiyoshi.desktop "build/rpmbuild/kiyoshi-$APP_VERSION/"
          cd build/rpmbuild
          tar czf "SOURCES/kiyoshi-$APP_VERSION.tar.gz" "kiyoshi-$APP_VERSION/"
      - name: Build RPM
        run: |
          cp packaging/kiyoshi.spec build/rpmbuild/SPECS/
          cp packaging/kiyoshi.sh build/rpmbuild/SOURCES/
          cp packaging/kiyoshi.desktop build/rpmbuild/SOURCES/
          QA_RPATHS=$(( 0x0002 )) rpmbuild -bb --define "_topdir $PWD/build/rpmbuild" build/rpmbuild/SPECS/kiyoshi.spec
      - name: Verify RPM
        run: |
          RPM_FILE=$(find build/rpmbuild/RPMS -name "*.rpm" | head -1)
          echo "RPM built: $RPM_FILE"
          rpm -qpl "$RPM_FILE" | head -20
          echo "✓ RPM package OK"
      - uses: softprops/action-gh-release@v2
        with:
          files: 'build/rpmbuild/RPMS/**/*.rpm'
          generate_release_notes: true
